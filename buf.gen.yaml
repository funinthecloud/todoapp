version: v2
managed:
  enabled: true
  disable:
    - file_option: go_package
plugins:
  - local: protoc-gen-go
    out: backend-bolt/gen
    opt:
      - module=github.com/funinthecloud/todoapp/backend-bolt/gen
  - local: protoc-gen-protosource
    out: backend-bolt/gen
    opt:
      - module=github.com/funinthecloud/todoapp/backend-bolt/gen
