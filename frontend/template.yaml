AWSTemplateFormatVersion: "2010-09-09"
Description: TodoApp frontend - CloudFront distribution serving from shared S3 bucket

Parameters:
  BucketName:
    Type: String
    Description: Existing S3 bucket name for static assets
  BucketPath:
    Type: String
    Default: todoapp/prod
    Description: Path prefix inside the bucket (e.g. todoapp/prod)
  DomainName:
    Type: String
    Default: todoapp.drhayt.com
    Description: Custom domain name
  CertificateArn:
    Type: String
    Description: ACM certificate ARN (must be in us-east-1)
  HostedZoneId:
    Type: String
    Description: Route 53 hosted zone ID

Resources:
  OriginAccessControl:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub "${AWS::StackName}-oac"
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  Distribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Aliases:
          - !Ref DomainName
        DefaultRootObject: index.html
        HttpVersion: http2and3
        PriceClass: PriceClass_100
        ViewerCertificate:
          AcmCertificateArn: !Ref CertificateArn
          SslSupportMethod: sni-only
          MinimumProtocolVersion: TLSv1.2_2021
        Origins:
          - Id: S3Origin
            DomainName: !Sub "${BucketName}.s3.amazonaws.com"
            OriginPath: !Sub "/${BucketPath}"
            OriginAccessControlId: !GetAtt OriginAccessControl.Id
            S3OriginConfig:
              OriginAccessIdentity: ""
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6  # CachingOptimized
          Compress: true
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 0
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 0

  BucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref BucketName
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowCloudFrontOAC
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "arn:aws:s3:::${BucketName}/${BucketPath}/*"
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${Distribution}"

  DnsRecord:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Ref DomainName
      Type: A
      AliasTarget:
        DNSName: !GetAtt Distribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2  # CloudFront's fixed hosted zone ID

Outputs:
  DistributionId:
    Description: CloudFront distribution ID (use for cache invalidation)
    Value: !Ref Distribution
  DistributionDomainName:
    Description: CloudFront domain name
    Value: !GetAtt Distribution.DomainName
  SiteUrl:
    Description: Site URL
    Value: !Sub "https://${DomainName}/"
  DeployCommand:
    Description: Command to deploy frontend assets
    Value: !Sub "aws s3 sync dist/ s3://${BucketName}/${BucketPath} --delete && aws cloudfront create-invalidation --distribution-id ${Distribution} --paths '/*'"
